[pytest]
# PyInfra Flamelet Test Configuration

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    integration: Integration tests requiring full setup
    unit: Unit tests for individual components
    framework: Framework operation tests
    tenant: Tenant configuration tests
    operations: Operation module tests
    config: Configuration generation tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
