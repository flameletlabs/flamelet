name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Check code style
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Verify CLI discovery
        run: |
          PYTHONPATH=. TENANT_PATH=tenants/example python -m core.cli --help
      - name: Verify tenant loads correctly
        env:
          FLAMELET_LOCAL: "1"
        run: |
          python3 << 'EOF'
          import os
          from pathlib import Path
          from core.cli import load_tenant_inventory, load_tenant_vars_module
          from core.tasks.loader import load_service_config

          tenant_path = Path("tenants/example")

          # Test inventory loads (with @local mode from FLAMELET_LOCAL env var)
          inventory = load_tenant_inventory(tenant_path)
          hosts = list(inventory)
          assert len(hosts) == 1, f"Expected 1 host (@local), got {len(hosts)}"
          assert hosts[0].name == "@local", f"Expected @local host, got {hosts[0].name}"

          # Test vars load
          vars_mod = load_tenant_vars_module(tenant_path)
          assert hasattr(vars_mod, "USERS"), "USERS not found in vars"
          assert "syseng" in vars_mod.USERS, "syseng user not found"

          # Test service config loads
          config = load_service_config(tenant_path, "MONIT")
          assert isinstance(config, dict), "MONIT config should be dict"

          print("✓ All tenant configuration checks passed")
          EOF
